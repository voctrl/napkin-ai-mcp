services:
  - type: web
    name: napkin-ai-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NAPKIN_API_KEY
        sync: false
      - key: NAPKIN_STORAGE_S3_BUCKET
        sync: false
      - key: NAPKIN_STORAGE_S3_REGION
        sync: false
      - key: NAPKIN_STORAGE_S3_ENDPOINT
        sync: false
      - key: NAPKIN_STORAGE_S3_PREFIX
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: NAPKIN_STORAGE_S3_FORCE_PATH_STYLE
        sync: false
